version: 2.1

jobs:
  run_cisco_7200:
    machine: true
    resource_class: iphonesekino-lab/eveng-test-susono

    steps:
      - checkout

      - run:
          name: Run Cisco 7200 Ansible Playbook
          command: |
            ansible-playbook -i inventory/hosts.ini playbooks/cisco-7200.yml

workflows:
  eveng_setup:
    jobs:
      - run_cisco_7200
      